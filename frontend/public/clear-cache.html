<!DOCTYPE html>
<html>
<head>
    <title>Cache Cleared</title>
    <script>
        // Clear all caches
        if ('caches' in window) {
            caches.keys().then(function(names) {
                names.forEach(function(name) {
                    caches.delete(name);
                });
            });
        }
        
        // Clear localStorage to see the issue
        const userData = localStorage.getItem('user');
        console.log('User data in localStorage:', userData);
        console.log('Parsed user:', JSON.parse(userData || '{}'));
        
        setTimeout(function() {
            window.location.href = '/admin';
        }, 2000);
    </script>
</head>
<body>
    <h1>Clearing cache and checking user data...</h1>
    <p>Check the browser console (F12) to see user data.</p>
    <p>Redirecting to admin panel...</p>
</body>
</html>
